name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration de l'environnement Java (Requis pour Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des outils de compilation système
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git zlib1g-dev libncurses5-dev \
            libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-compat-dev liblzma-dev lzma uuid-dev

      - name: Installation de Buildozer et Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Compilation de l'APK avec Buildozer
        run: |
          # Le "yes |" permet d'accepter automatiquement les licences du SDK Android pendant le build
          yes | buildozer android debug

      - name: Upload de l'APK (Artefact)
        uses: actions/upload-artifact@v4
        with:
          name: DetecteurCouleur-APK
          path: bin/*.apk
      
